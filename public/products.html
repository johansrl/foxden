<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Virtual | Fox Den Cyber</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦊</text></svg>">
</head>
<body>
    <div class="background-elements">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <main class="container">
        <nav class="navbar">
            <div class="nav-logo">Fox Den <span class="highlight-alt">API</span></div>
            <ul class="nav-links">
                <li><a href="./index.html">SYS.Main</a></li>
                <li><a href="./about.html">Nosotros</a></li>
                <li><a href="./products.html" class="active">Catálogo</a></li>
                <li><a href="./sales.html">Transacciones</a></li>
                <li><a href="./clients.html">Gestión</a></li>
            </ul>
        </nav>

        <div class="glass-card page-content">
            <header class="card-header" style="margin-bottom: 2rem;">
                <h1 class="title">Bases de <span class="highlight">Nutrición</span></h1>
                <p class="subtitle">Catálogo de Suministros</p>
            </header>

            <div id="loading" style="text-align: center; color: var(--accent-blue); font-family: monospace; font-size: 1.2rem;">
                <p>> Escaneando base de datos...</p>
                <div style="width: 50px; height: 2px; background: var(--accent-blue); margin: 10px auto; animation: glitch 0.2s infinite;"></div>
            </div>

            <div id="products-grid" class="products-grid hidden">
                <!-- Se llenará dinámicamente con JS -->
            </div>
            
            <div id="error-message" class="alert error hidden" style="margin-top: 2rem;"></div>
        </div>
    </main>

    <script>
        document.addEventListener('mousemove', (e) => {
            const orbs = document.querySelectorAll('.glow-orb');
            const mouseX = e.clientX / window.innerWidth;
            const mouseY = e.clientY / window.innerHeight;

            orbs[0].style.transform = `translate(${mouseX * 30}px, ${mouseY * 30}px)`;
            orbs[1].style.transform = `translate(${mouseX * -40}px, ${mouseY * -40}px)`;
            orbs[2].style.transform = `translate(${mouseX * 20}px, ${mouseY * -20}px)`;
        });

        async function fetchProducts() {
            try {
                const token = localStorage.getItem('fox-token');
                const headers = { 'Content-Type': 'application/json' };
                if (token) headers['Authorization'] = `Bearer ${token}`;

                const res = await fetch('/api/inventario', { headers });
                
                if (res.status === 401 || res.status === 403) {
                    throw new Error('ACCESO DENEGADO. Nivel de autorización requerido.');
                }
                
                const data = await res.json();
                
                if (res.ok) {
                    renderProducts(data);
                } else {
                    throw new Error(data.error || 'Fallo al recuperar los activos');
                }
            } catch (error) {
                document.getElementById('loading').classList.add('hidden');
                const errBox = document.getElementById('error-message');
                errBox.textContent = `[ERROR CRÍTICO]: ${error.message}`;
                errBox.classList.remove('hidden');
            }
        }

        function renderProducts(products) {
            document.getElementById('loading').classList.add('hidden');
            const grid = document.getElementById('products-grid');
            grid.classList.remove('hidden');

            const userRole = localStorage.getItem('fox-rol');

            if (products.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; font-family: monospace; color: var(--accent-orange);">Base de datos de suministros vacía.</p>';
                return;
            }

            products.forEach(p => {
                const stockClass = p.cantidad < 10 ? 'stock-low' : '';
                const imgUrl = p.imagen_url ? p.imagen_url : 'https://placehold.co/400x200/05050a/00f0ff?text=NO+IMAGE+DATA';
                
                const stockHtml = (userRole === 'jefe' || userRole === 'personal') 
                    ? `<span class="product-stock ${stockClass}">QTY: ${p.cantidad}</span>` 
                    : `<span></span>`;

                const card = `
                    <div class="product-card">
                        <div class="product-image" style="background-image: url('${imgUrl}');"></div>
                        <div class="product-content">
                            <div class="product-header">
                                <h3 class="product-title">${p.nombre}</h3>
                                <span class="product-price">¤${p.precio}</span>
                            </div>
                            <p class="product-desc">${p.descripcion || 'Sin datos de composición.'}</p>
                            <div class="product-footer">
                                ${stockHtml}
                                <span style="font-size:0.7rem; color:var(--text-muted); font-family:monospace;">ID: ${p.id}</span>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        window.addEventListener('DOMContentLoaded', fetchProducts);
    </script>
</body>
</html>
